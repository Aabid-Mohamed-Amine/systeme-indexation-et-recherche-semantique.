services:
  mongo:
    image: mongo:7
    container_name: snrt_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  snrt-search:
    build: .
    image: snrt-search:latest
    container_name: snrt_archives
    ports:
      - "8501:8501"
    volumes:
      # Models & index — heavy files mounted, not baked into image
      - ./data:/app/data
      - ./model:/app/model
      - ./snrt_biencoder_v2:/app/snrt_biencoder_v2
      - ./videos:/app/videos
      - ./uploads:/app/uploads
    environment:
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=2000
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=SNRT_ARCHIVE
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  mongo_data:
